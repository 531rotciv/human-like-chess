version: '3.8'
services:
  frontend:
    build:
      context: .
      dockerfile: frontend.dockerfile
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    tty: true

  backend:
    build:
      context: .
      dockerfile: backend.dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./configurations:/app/configurations:ro
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
    tty: true
